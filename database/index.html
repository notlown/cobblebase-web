<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh;padding-top:56px}
a{color:#f7c948;text-decoration:none}
a:hover{text-decoration:underline}
header{background:#161b22;border-bottom:1px solid #30363d;padding:0 0 1rem;text-align:center}

table{width:100%;border-collapse:collapse}

.sprite-wrap{width:48px;height:48px;min-width:48px;overflow:hidden;border-radius:4px;background:#161b22;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sprite-wrap img{width:100%;height:100%;object-fit:contain;image-rendering:auto}

.cat-gathering{border-left:2px solid #4caf50}.cat-generation{border-left:2px solid #ff9800}.cat-combat{border-left:2px solid #f44336}
.cat-support{border-left:2px solid #e91e9e}.cat-utility{border-left:2px solid #2196f3}.cat-legendary{border-left:2px solid #ffd700}.cat-fairy{border-left:2px solid #f0abfc}

footer{text-align:center;padding:2rem;color:#8b949e;font-size:0.75rem;border-top:1px solid #21262d;margin-top:2rem}
tr.species-row{cursor:pointer;transition:background 0.2s}
tr.species-row.expanded{background:#161b22}
tr.detail-row td{padding:0;border-bottom:1px solid #21262d}
.detail-panel{max-height:0;overflow:hidden;transition:max-height 0.4s ease,padding 0.3s ease;padding:0 12px;background:#161b22;border-radius:0 0 8px 8px}
.detail-panel.open{max-height:2000px;padding:12px}
.detail-close{float:right;background:none;border:1px solid #30363d;color:#8b949e;border-radius:4px;padding:2px 10px;cursor:pointer;font-size:0.8rem}
.detail-close:hover{color:#c9d1d9;border-color:#8b949e}
.detail-cat{margin-bottom:10px}
.detail-cat-header{font-size:0.85rem;font-weight:700;padding:4px 8px;margin-bottom:4px;border-left:3px solid #30363d;border-radius:2px;text-transform:capitalize}
.detail-cat-header.gathering{border-color:#4caf50;color:#4caf50}
.detail-cat-header.combat{border-color:#f44336;color:#f44336}
.detail-cat-header.support{border-color:#e91e9e;color:#e91e9e}
.detail-cat-header.utility{border-color:#2196f3;color:#2196f3}
.detail-cat-header.legendary{border-color:#ffd700;color:#ffd700}
.detail-cat-header.generation{border-color:#ff9800;color:#ff9800}

.detail-skill .ds-name{color:#c9d1d9}
.detail-skill .ds-stars{color:#f7c948;letter-spacing:1px;cursor:pointer}
.detail-skill.highlighted{box-shadow:0 0 8px 2px #f7c94888,inset 0 0 0 1px #f7c948}
.detail-skill.highlighted .ds-name{color:#f7c948;font-weight:700}
.detail-skill .ds-remove{color:#f44336;cursor:pointer;font-size:0.9rem;margin-left:4px;opacity:0.5;transition:opacity 0.2s}
.detail-skill .ds-remove:hover{opacity:1}
.clickable-star{cursor:pointer;transition:transform 0.1s,color 0.1s}.clickable-star:hover{transform:scale(1.3)}
.modified-badge{font-size:0.65rem;background:#f7c948;color:#0d1117;padding:1px 5px;border-radius:3px;margin-left:6px;font-weight:700}
.editor-bar{max-width:1200px;margin:0.5rem auto;padding:0 1rem;display:none}
.editor-bar-inner{background:#161b22;border:1px solid #30363d;border-left:3px solid #f7c948;border-radius:6px;padding:10px 16px;display:flex;align-items:center;gap:12px;font-size:0.9rem}
.editor-bar button{background:#f7c948;color:#0d1117;border:none;padding:6px 16px;border-radius:6px;cursor:pointer;font-weight:600;font-size:0.85rem}
.editor-bar button:hover{opacity:0.85}
.editor-bar button.reset-btn{background:#f44336;color:#fff}
.detail-layout{display:flex;gap:24px}
.detail-profile{min-width:180px;max-width:200px;display:flex;flex-direction:column;align-items:center;gap:8px;padding:8px;background:#0d1117;border-radius:8px;border:1px solid #21262d}
.detail-profile img{width:120px;height:120px;image-rendering:auto;border-radius:8px}
.detail-profile-name{font-size:1.1rem;font-weight:700;color:#f0f6fc;text-transform:capitalize;text-align:center}
.detail-profile-stats{font-size:0.8rem;color:#8b949e;text-align:center;line-height:1.6}
.detail-profile-stats span{color:#f7c948}
.detail-skills-section{flex:1;min-width:0}
.prof-col{text-align:center;white-space:nowrap}
</style>

<body>
<header>
<img src="../cobblebase_header.png" alt="Cobblebase" class="banner">
<h1>Species Database</h1>
<p class="subtitle">Browse all 8,426 Pokemon species with their Cobblebase skill assignments</p>
<nav><a href="../docs/index.html">Documentation</a> | <a href="../generator/index.html">Datapack Generator</a> | <a href="https://github.com/notlown/cobblebase">GitHub</a></nav>
</header>

<div class="controls">
<input type="text" id="search" placeholder="Search species...">
<select id="skill-filter"><option value="">All Skills</option></select>
<select id="sort">
<option value="name">Sort: Name (A-Z)</option>
<option value="name-desc">Sort: Name (Z-A)</option>
<option value="count">Sort: Most Skills</option>
<option value="count-asc">Sort: Fewest Skills</option>
<option value="prof">Sort: Highest Prof</option>
<option value="prof-asc">Sort: Lowest Prof</option>
<option value="total">Sort: Total Prof (High)</option>
<option value="total-asc">Sort: Total Prof (Low)</option>
<option value="skill-prof">Sort: Filtered Skill Prof (High)</option>
<option value="skill-prof-asc">Sort: Filtered Skill Prof (Low)</option>
</select>
<select id="mod-filter"><option value="cobblemon">Cobblemon Only</option><option value="all">All (incl. Fakemons)</option><option value="lively">Lively Mons</option><option value="alatias">Alatias AFP</option><option value="laser">Laser's Pack</option><option value="wilbayan">Wilbayan's</option><option value="gravelmon">Gravelmon</option></select>
</div>
<div id="skill-desc" style="max-width:1200px;margin:0.5rem auto;padding:0 1rem;display:none">
<div style="background:#161b22;border:1px solid #30363d;border-left:3px solid #f7c948;border-radius:6px;padding:10px 16px;font-size:0.9rem;color:#c9d1d9;display:flex;align-items:center;gap:10px">
<span style="color:#f7c948;font-weight:700;font-size:1rem" id="skill-desc-name"></span>
<span style="color:#8b949e" id="skill-desc-text"></span>
<span style="margin-left:auto;color:#484f58;font-size:0.8rem;white-space:nowrap" id="skill-desc-meta"></span>
</div>
</div>
<div class="editor-bar" id="editor-bar"><div class="editor-bar-inner">
<span style="color:#f7c948;font-weight:700">Editor Mode</span>
<span style="color:#8b949e" id="edit-count">0 changes</span>
<button onclick="exportChanges()">Export JSON</button>
<button onclick="submitToDiscord()">Submit to Discord</button>
<button class="reset-btn" onclick="resetChanges()">Reset All</button>
</div></div>
<div class="stats" id="stats">Loading...</div>
<div class="table-wrap">
<table><thead><tr><th>Pokemon</th><th>Skills</th><th>Skill Count</th><th>Highest Prof</th><th>Total Prof</th></tr></thead><tbody id="tbody"></tbody></table>
</div>
<div class="pagination" id="pagination"></div>
<footer>Cobblebase &mdash; <a href="https://modrinth.com/project/cobblebase">Modrinth</a> &bull; <a href="https://discord.gg/6As3sVZgVT">Discord</a> &bull; <a href="https://ko-fi.com/notlown">Ko-fi</a></footer>

<script src="database-data.js"></script>
<script>
(function(){
const PER_PAGE=50;
let page=0,filtered=[],currentMod="cobblemon",expandedSpecies=null;
const search=document.getElementById("search"),skillFilter=document.getElementById("skill-filter"),
sortEl=document.getElementById("sort"),modFilter=document.getElementById("mod-filter"),
tbody=document.getElementById("tbody"),stats=document.getElementById("stats"),pag=document.getElementById("pagination"),
skillDescEl=document.getElementById("skill-desc"),skillDescName=document.getElementById("skill-desc-name"),
skillDescText=document.getElementById("skill-desc-text"),skillDescMeta=document.getElementById("skill-desc-meta");

var SKILL_INFO={
"Alchemist":{desc:"Searches the area for evolution items and stones",cd:300,cat:"gathering"},
"Archeologist":{desc:"Digs for fossils and ancient treasures",cd:300,cat:"gathering"},
"Architect":{desc:"Searches the area for building materials",cd:300,cat:"gathering"},
"Armorer":{desc:"Searches the area for battle held items",cd:300,cat:"gathering"},
"Aura Boost":{desc:"All nearby workers perform jobs faster",cd:0,cat:"legendary"},
"Botanist":{desc:"Searches the area for seeds and plantable items",cd:300,cat:"gathering"},
"Brewing Fuel":{desc:"Adds fuel to brewing stands",cd:300,cat:"generation"},
"Chef":{desc:"Searches the area for food and cooking ingredients",cd:300,cat:"gathering"},
"Collector":{desc:"Searches the area for Pokeballs of all types",cd:300,cat:"gathering"},
"Excavator":{desc:"Searches the area for ores and raw minerals",cd:300,cat:"gathering"},
"Extinguisher":{desc:"Puts out nearby fires",cd:0,cat:"utility"},
"Fishing":{desc:"Catches fish from nearby water",cd:300,cat:"gathering"},
"Friend Recruiter":{desc:"Attracts rare wild Pokemon to appear nearby",cd:300,cat:"fairy"},
"Furnace Fuel":{desc:"Adds fuel to furnaces",cd:300,cat:"generation"},
"Growth Aura":{desc:"Crops and berries grow faster nearby",cd:0,cat:"legendary"},
"Guard":{desc:"Repels wild Pokemon, earns XP or loot",cd:300,cat:"combat"},
"Harvester":{desc:"Harvests crops, berries, apricorns, mints, and more",cd:60,cat:"gathering"},
"Haste Boost":{desc:"Grants Haste I to nearby players",cd:60,cat:"support"},
"Healer":{desc:"Heals nearby players with regeneration",cd:0,cat:"support"},
"Honey Collect":{desc:"Produces honey and honeycomb",cd:300,cat:"gathering"},
"Irrigator":{desc:"Hydrates nearby farmland",cd:0,cat:"utility"},
"Item Gatherer":{desc:"Picks up dropped items and sorts them into nearby chests",cd:5,cat:"utility"},
"Jump Boost":{desc:"Grants Jump Boost I to nearby players",cd:60,cat:"support"},
"Lava Fill":{desc:"Fills cauldrons with lava",cd:300,cat:"generation"},
"Lucky Charm":{desc:"Increases shiny rate for wild Pokemon near the owner",cd:0,cat:"legendary"},
"Mentor":{desc:"Boosts passive XP gain for all Pokemon in the base",cd:0,cat:"support"},
"Mining":{desc:"Digs for ores, tumblestones, fossils, and gems",cd:300,cat:"gathering"},
"Night Vision":{desc:"Grants Night Vision to nearby players",cd:60,cat:"support"},
"Pharmacist":{desc:"Searches the area for healing items and berries",cd:300,cat:"gathering"},
"Prospector":{desc:"Searches the area for relics and treasure",cd:300,cat:"gathering"},
"Recruiter":{desc:"Attracts legendary wild Pokemon to spawn near your base",cd:540,cat:"legendary"},
"Resistance Boost":{desc:"Grants Resistance I to nearby players",cd:60,cat:"support"},
"Saturation Boost":{desc:"Grants Saturation to nearby players",cd:60,cat:"support"},
"Scholar":{desc:"Searches the area for XP Candies and Rare Candies",cd:300,cat:"gathering"},
"Scout":{desc:"Explores the area to discover wild Pokemon, structures, and biomes",cd:300,cat:"utility"},
"Smith":{desc:"Searches the area for smithing templates and pottery",cd:300,cat:"gathering"},
"Snow Fill":{desc:"Fills cauldrons with powder snow",cd:300,cat:"generation"},
"Speed Boost":{desc:"Grants Speed II to nearby players",cd:60,cat:"support"},
"Strength Boost":{desc:"Grants Strength I to nearby players",cd:60,cat:"support"},
"Trainer":{desc:"Searches the area for vitamins and training items",cd:300,cat:"gathering"},
"Water Breathing":{desc:"Grants Water Breathing to nearby players",cd:60,cat:"support"},
"Water Fill":{desc:"Fills cauldrons with water",cd:300,cat:"generation"}
};

// === SKILL ID MAPPING (name -> id for export) ===
var SKILL_IDS={
"Alchemist":"cobblebase:finder_evo","Archeologist":"cobblebase:archeologist","Architect":"cobblebase:finder_bui",
"Armorer":"cobblebase:finder_held","Aura Boost":"cobblebase:aura_boost","Botanist":"cobblebase:finder_see",
"Brewing Fuel":"cobblebase:brew_fuel","Chef":"cobblebase:finder_food","Collector":"cobblebase:finder_bal",
"Excavator":"cobblebase:finder_ore","Extinguisher":"cobblebase:extinguisher","Fishing":"cobblebase:fishing",
"Friend Recruiter":"cobblebase:friend_recruiter","Furnace Fuel":"cobblebase:furnace_fuel",
"Growth Aura":"cobblebase:growth_aura","Guard":"cobblebase:guard","Harvester":"cobblebase:harvester",
"Haste Boost":"cobblebase:haste_boost","Healer":"cobblebase:healer","Honey Collect":"cobblebase:honey_collect",
"Irrigator":"cobblebase:irrigator","Item Gatherer":"cobblebase:gatherer","Jump Boost":"cobblebase:jump_boost",
"Lava Fill":"cobblebase:lava_fill","Lucky Charm":"cobblebase:lucky_charm","Mentor":"cobblebase:mentor",
"Mining":"cobblebase:mining","Night Vision":"cobblebase:night_vision","Pharmacist":"cobblebase:finder_hea",
"Prospector":"cobblebase:finder_treasure","Recruiter":"cobblebase:recruiter",
"Resistance Boost":"cobblebase:resistance_boost","Saturation Boost":"cobblebase:saturation_boost",
"Scholar":"cobblebase:finder_exp","Scout":"cobblebase:scout","Smith":"cobblebase:finder_smith",
"Snow Fill":"cobblebase:snow_fill","Speed Boost":"cobblebase:speed_boost",
"Strength Boost":"cobblebase:strength_boost","Trainer":"cobblebase:finder_stat",
"Water Breathing":"cobblebase:water_breathing","Water Fill":"cobblebase:water_fill"
};

// === EDITOR STATE ===
var modifications={};// species name -> modified skills array
var editorBar=document.getElementById("editor-bar"),editCount=document.getElementById("edit-count");

function updateEditorBar(){
var count=Object.keys(modifications).length;
editorBar.style.display=count>0?"block":"none";
editCount.textContent=count+" change"+(count!==1?"s":"");
}

function modifySpecies(s,newSkills){
s.skills=newSkills;
s.count=newSkills.length;
s.maxProf=newSkills.length>0?Math.max.apply(null,newSkills.map(function(x){return x.prof})):0;
s.totalProf=0;newSkills.forEach(function(sk){s.totalProf+=sk.prof});
modifications[s.name]=newSkills;
updateEditorBar();
}

function changeProf(s,skillName,newProf){
var newSkills=s.skills.map(function(sk){
if(sk.name===skillName)return{id:sk.id,name:sk.name,cat:sk.cat,prof:newProf};
return sk;
});
modifySpecies(s,newSkills);
}

function removeSkill(s,skillName){
var newSkills=s.skills.filter(function(sk){return sk.name!==skillName});
modifySpecies(s,newSkills);
}

function addSkill(s,skillName){
if(s.skills.some(function(sk){return sk.name===skillName}))return;
var id=SKILL_IDS[skillName]||"cobblebase:unknown";
var cat=SKILL_INFO[skillName]?SKILL_INFO[skillName].cat:"utility";
var newSkills=s.skills.slice();
newSkills.push({id:id,name:skillName,cat:cat,prof:1});
modifySpecies(s,newSkills);
}

// Export as species JSON files
window.exportChanges=function(){
var keys=Object.keys(modifications);
if(keys.length===0)return;
if(keys.length===1){
// Single file download
var name=keys[0];
var data=buildSpeciesJson(name,modifications[name]);
downloadFile(name+".json",JSON.stringify(data,null,2));
}else{
// Multiple: download as single combined file
var all={};
keys.forEach(function(name){all[name]=buildSpeciesJson(name,modifications[name])});
downloadFile("cobblebase_species_edits.json",JSON.stringify(all,null,2));
}
};

function buildSpeciesJson(name,skills){
return{species:name,skills:skills.map(function(sk){return{skillId:sk.id||SKILL_IDS[sk.name]||"cobblebase:unknown",proficiency:sk.prof}})};
}

function downloadFile(filename,content){
var blob=new Blob([content],{type:"application/json"});
var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=filename;a.click();URL.revokeObjectURL(a.href);
}

window.submitToDiscord=function(){
var keys=Object.keys(modifications);
if(keys.length===0)return;
var username=prompt("Your name (for credit in the submission):");
if(!username)return;
var lines=[];
keys.forEach(function(name){
var skills=modifications[name];
var skillList=skills.map(function(sk){return sk.name+" ("+sk.prof+")"}).join(", ");
lines.push("**"+name+"**: "+skillList);
});
var body=JSON.stringify({
username:"Species Editor",
embeds:[{
title:"Skill Change Submission",
description:lines.join("\n"),
color:16238920,
footer:{text:"Submitted by "+username},
timestamp:new Date().toISOString(),
fields:[{name:"Raw JSON",value:"```json\n"+JSON.stringify(keys.map(function(name){return buildSpeciesJson(name,modifications[name])}),null,1).substring(0,1000)+"\n```"}]
}]
});
fetch("https://discord.com/api/webhooks/1489934162046619818/RvvwNLSUouIXd7q3YZZaM8QzmbW_kRa5p9_77fueYFgRM5XaV9FkzKEfU5EKkwJ2Dk15",{
method:"POST",headers:{"Content-Type":"application/json"},body:body
}).then(function(r){
if(r.ok)alert("Submitted! Your changes have been sent to the Cobblebase Discord for review.");
else alert("Failed to submit. Try Export JSON instead.");
}).catch(function(){alert("Failed to submit. Try Export JSON instead.")});
};

window.resetChanges=function(){
if(!confirm("Reset all "+Object.keys(modifications).length+" changes?"))return;
// Reload page to restore original data
location.reload();
};

function updateSkillDesc(){
var sk=skillFilter.value;
if(!sk||!SKILL_INFO[sk]){skillDescEl.style.display="none";return}
var info=SKILL_INFO[sk];
skillDescEl.style.display="block";
skillDescName.textContent=sk;
skillDescText.textContent=info.desc;
skillDescMeta.textContent=info.cat+(info.cd>0?" \u00b7 "+info.cd+"s cooldown":" \u00b7 passive");
}

// Precompute totalProf for each species
SPECIES_DB.forEach(function(s){
    s.totalProf=0;
    s.skills.forEach(function(sk){s.totalProf+=sk.prof});
});

// Populate skill filter (sorted alphabetically)
const skillNames=new Set();
SPECIES_DB.forEach(function(s){s.skills.forEach(function(sk){skillNames.add(sk.name)})});
[...skillNames].sort().forEach(function(n){var o=document.createElement("option");o.value=n;o.textContent=n;skillFilter.appendChild(o)});

function stars(n){return "<span style='color:#f7c948'>"+ "\u2605".repeat(n)+"</span><span style='color:#30363d'>"+ "\u2605".repeat(5-n)+"</span>"}
function spriteUrl(name){return"https://img.pokemondb.net/sprites/home/normal/"+name.replace(/[^a-z0-9-]/g,"")+".png"}

// Get proficiency of the currently filtered skill for a species
function getFilteredSkillProf(s){
    var sk=skillFilter.value;
    if(!sk)return 0;
    for(var i=0;i<s.skills.length;i++){if(s.skills[i].name===sk)return s.skills[i].prof}
    return 0;
}

function rebuildDetailContent(panel,s,tr,detailTr){
// Keep panel open, just rebuild inner content
var wasOpen=panel.classList.contains("open");
panel.innerHTML="";
buildDetailInner(panel,s,tr,detailTr);
if(wasOpen)panel.classList.add("open");
}

function toggleDetail(tr,detailTr,panel,s){
var isOpen=panel.classList.contains("open");
var prevOpen=tbody.querySelector(".detail-panel.open");
if(prevOpen){prevOpen.classList.remove("open");prevOpen.closest("tr").previousElementSibling.classList.remove("expanded")}
if(isOpen){expandedSpecies=null;return}
panel.innerHTML="";
buildDetailInner(panel,s,tr,detailTr);
tr.classList.add("expanded");
requestAnimationFrame(function(){panel.classList.add("open")});
expandedSpecies=s.name;
}

function buildDetailInner(panel,s,tr,detailTr){
var closeBtn=document.createElement("button");closeBtn.className="detail-close";closeBtn.textContent="Close";
closeBtn.addEventListener("click",function(e){e.stopPropagation();panel.classList.remove("open");tr.classList.remove("expanded");expandedSpecies=null});
panel.appendChild(closeBtn);
// Two-column layout: profile left, skills right
var layout=document.createElement("div");layout.className="detail-layout";
// Left: profile card
var profile=document.createElement("div");profile.className="detail-profile";
var bigSprite=document.createElement("img");bigSprite.src="https://img.pokemondb.net/sprites/home/normal/"+s.name.replace(/[^a-z0-9-]/g,"")+".png";
bigSprite.alt=s.name;bigSprite.onerror=function(){this.style.display="none"};
profile.appendChild(bigSprite);
var pName=document.createElement("div");pName.className="detail-profile-name";pName.textContent=s.name;profile.appendChild(pName);
var pStats=document.createElement("div");pStats.className="detail-profile-stats";
pStats.innerHTML=s.count+" Skills<br>Highest: <span>"+stars(s.maxProf)+"</span><br>Total Prof: <span>"+s.totalProf+"</span>"
+(s.mod!=="cobblemon"?"<br>Pack: "+s.mod:"");
profile.appendChild(pStats);layout.appendChild(profile);
// Right: ALL skills by category (owned = normal, unowned = faded)
var skillsSection=document.createElement("div");skillsSection.className="detail-skills-section";
var ownedMap={};
s.skills.forEach(function(sk){ownedMap[sk.name]=sk});
var catOrder=["gathering","combat","support","utility","generation","legendary","fairy"];
var activeFilter=skillFilter.value;
var dMinProf=s.skills.length>0?Math.min.apply(null,s.skills.map(function(x){return x.prof})):0;

// Group ALL skills by category
var allByCat={};
Object.keys(SKILL_INFO).sort().forEach(function(name){
var cat=SKILL_INFO[name].cat;
if(!allByCat[cat])allByCat[cat]=[];
allByCat[cat].push(name);
});

catOrder.forEach(function(cat){
if(!allByCat[cat])return;
var ownedCount=allByCat[cat].filter(function(n){return !!ownedMap[n]}).length;
var catDiv=document.createElement("div");catDiv.className="detail-cat";
var header=document.createElement("div");header.className="detail-cat-header "+cat;
header.textContent=cat+" ("+ownedCount+"/"+allByCat[cat].length+")";
catDiv.appendChild(header);
var grid=document.createElement("div");grid.className="detail-skills-grid";

allByCat[cat].forEach(function(skillName){
var owned=ownedMap[skillName];
var prof=owned?owned.prof:0;
var item=document.createElement("div");item.className="detail-skill";
var dtip=SKILL_INFO[skillName];
if(dtip)item.title=skillName+" — "+dtip.desc;
if(!owned)item.style.opacity="0.25";
if(activeFilter&&skillName===activeFilter)item.className+=" highlighted";
var mark="";
if(owned&&prof===s.maxProf){mark=" <span style='color:#4caf50;font-size:0.7rem'>\u25B2</span>";item.style.background="#4caf5018";item.style.borderColor="#4caf5044"}
else if(owned&&prof===dMinProf&&s.skills.length>1){mark=" <span style='color:#f44336;font-size:0.7rem'>\u25BC</span>";item.style.background="#f4433618";item.style.borderColor="#f4433644"}

// Clickable stars
var starsHtml="";
for(var i=1;i<=5;i++){
starsHtml+="<span class='clickable-star' data-prof='"+i+"' data-skill='"+skillName+"' style='color:"+(i<=prof?"#f7c948":"#30363d")+"'>\u2605</span>";
}
item.innerHTML="<span class='ds-name'>"+skillName+"</span><span class='ds-stars'>"+starsHtml+"</span>"+mark
+(owned?"<span class='ds-remove' title='Remove skill'>\u2716</span>":"");

// Star hover — show full opacity on hover for unowned
item.addEventListener("mouseenter",function(){if(!owned)this.style.opacity="0.7"});
item.addEventListener("mouseleave",function(){if(!ownedMap[skillName])this.style.opacity="0.25"});

// Star hover preview
var starsContainer=item.querySelector(".ds-stars");
starsContainer.addEventListener("mouseleave",function(){
var curProf=ownedMap[skillName]?ownedMap[skillName].prof:0;
this.querySelectorAll(".clickable-star").forEach(function(st,idx){
st.style.color=(idx<curProf)?"#f7c948":"#30363d";
});
});
item.querySelectorAll(".clickable-star").forEach(function(star){
star.addEventListener("mouseenter",function(){
var hoverProf=parseInt(this.getAttribute("data-prof"));
this.parentElement.querySelectorAll(".clickable-star").forEach(function(st,idx){
st.style.color=(idx<hoverProf)?"#f7c948":"#30363d";
});
});
star.addEventListener("click",function(e){
e.stopPropagation();
var newProf=parseInt(this.getAttribute("data-prof"));
var skName=this.getAttribute("data-skill");
if(ownedMap[skName]){
changeProf(s,skName,newProf);
}else{
addSkill(s,skName);
// Set prof after adding (addSkill defaults to 1)
if(newProf>1)changeProf(s,skName,newProf);
}
rebuildDetailContent(panel,s,tr,detailTr);
applyFilters();
});
});
// Remove handler
var removeBtn=item.querySelector(".ds-remove");
if(removeBtn){
removeBtn.addEventListener("click",function(e){
e.stopPropagation();
removeSkill(s,skillName);
rebuildDetailContent(panel,s,tr,detailTr);
applyFilters();
});
}
grid.appendChild(item);
});
catDiv.appendChild(grid);skillsSection.appendChild(catDiv);
});
layout.appendChild(skillsSection);panel.appendChild(layout);
}

function applyFilters(){
var q=search.value.toLowerCase().trim(),sk=skillFilter.value;currentMod=modFilter.value;var mod=currentMod;
filtered=SPECIES_DB.filter(function(s){
if(mod==="cobblemon"&&s.mod!=="cobblemon")return false;
if(mod!=="all"&&mod!=="cobblemon"&&s.mod!==mod)return false;
if(q&&!s.name.includes(q))return false;
if(sk&&!s.skills.some(function(x){return x.name===sk}))return false;
return true;
});
var sv=sortEl.value;
if(sv==="count")filtered.sort(function(a,b){return b.count-a.count});
else if(sv==="count-asc")filtered.sort(function(a,b){return a.count-b.count});
else if(sv==="prof")filtered.sort(function(a,b){return b.maxProf-a.maxProf||a.name.localeCompare(b.name)});
else if(sv==="prof-asc")filtered.sort(function(a,b){return a.maxProf-b.maxProf||a.name.localeCompare(b.name)});
else if(sv==="total")filtered.sort(function(a,b){return b.totalProf-a.totalProf||a.name.localeCompare(b.name)});
else if(sv==="total-asc")filtered.sort(function(a,b){return a.totalProf-b.totalProf||a.name.localeCompare(b.name)});
else if(sv==="skill-prof")filtered.sort(function(a,b){return getFilteredSkillProf(b)-getFilteredSkillProf(a)||a.name.localeCompare(b.name)});
else if(sv==="skill-prof-asc")filtered.sort(function(a,b){return getFilteredSkillProf(a)-getFilteredSkillProf(b)||a.name.localeCompare(b.name)});
else if(sv==="name-desc")filtered.sort(function(a,b){return b.name.localeCompare(a.name)});
else filtered.sort(function(a,b){return a.name.localeCompare(b.name)});
page=0;render();
}

function render(){
var start=page*PER_PAGE,end=Math.min(start+PER_PAGE,filtered.length),slice=filtered.slice(start,end);
var modLabel=currentMod==="all"?" (all mods)":currentMod==="cobblemon"?"":" ("+currentMod+")";
stats.textContent="Showing "+(filtered.length>0?start+1:0)+"-"+end+" of "+filtered.length+" species"+modLabel;
tbody.innerHTML="";expandedSpecies=null;
var activeFilter=skillFilter.value;
slice.forEach(function(s){
var tr=document.createElement("tr");tr.className="species-row";
// Pokemon name cell
var nameCell=document.createElement("td");
var cellWrap=document.createElement("div");cellWrap.className="pokemon-cell";
var spriteWrap=document.createElement("div");spriteWrap.className="sprite-wrap";
var img=document.createElement("img");img.src=spriteUrl(s.name);img.alt="";img.loading="lazy";img.onerror=function(){this.parentElement.style.display="none"};
spriteWrap.appendChild(img);cellWrap.appendChild(spriteWrap);
var infoWrap=document.createElement("div");infoWrap.className="pokemon-info";
var span=document.createElement("span");span.className="species-name";span.textContent=s.name;infoWrap.appendChild(span);
if(s.mod!=="cobblemon"){var b=document.createElement("span");b.className="fakemon-badge";b.textContent=s.mod;infoWrap.appendChild(b)}
if(modifications[s.name]){var mb=document.createElement("span");mb.className="modified-badge";mb.textContent="EDITED";infoWrap.appendChild(mb)}
cellWrap.appendChild(infoWrap);nameCell.appendChild(cellWrap)
tr.appendChild(nameCell);
// Skills cell — sorted alphabetically
var skillCell=document.createElement("td");
var tags=document.createElement("div");tags.className="skill-tags";
var sortedSkills=s.skills.slice().sort(function(a,b){return a.name.localeCompare(b.name)});
var minProf=Math.min.apply(null,s.skills.map(function(x){return x.prof}));
sortedSkills.forEach(function(sk){
var tag=document.createElement("span");tag.className="skill-tag cat-"+sk.cat;
var tipInfo=SKILL_INFO[sk.name];
if(tipInfo)tag.title=sk.name+" — "+tipInfo.desc;
if(activeFilter&&sk.name===activeFilter)tag.className+=" highlighted";
if(sk.prof===s.maxProf)tag.className+=" best-skill";
else if(sk.prof===minProf&&s.skills.length>1)tag.className+=" worst-skill";
var mark="";
if(sk.prof===s.maxProf)mark="<span class='best-icon' style='color:#4caf50'>\u25B2</span>";
else if(sk.prof===minProf&&s.skills.length>1)mark="<span class='best-icon' style='color:#f44336'>\u25BC</span>";
tag.innerHTML="<span class='sk-name'>"+sk.name+"</span><span class='stars'>"+stars(sk.prof)+"</span>"+mark;
tags.appendChild(tag);
});
skillCell.appendChild(tags);tr.appendChild(skillCell);
// Skill count
var countCell=document.createElement("td");countCell.className="prof-col";countCell.textContent=s.count;tr.appendChild(countCell);
// Highest prof
var profCell=document.createElement("td");profCell.className="prof-col";profCell.innerHTML="<span style='color:#f7c948'>"+stars(s.maxProf)+"</span>";tr.appendChild(profCell);
// Total prof
var totalCell=document.createElement("td");totalCell.className="prof-col";totalCell.textContent=s.totalProf;tr.appendChild(totalCell);
tbody.appendChild(tr);
// Detail row
var detailTr=document.createElement("tr");detailTr.className="detail-row";
var detailTd=document.createElement("td");detailTd.colSpan=5;
var panel=document.createElement("div");panel.className="detail-panel";
detailTd.appendChild(panel);detailTr.appendChild(detailTd);tbody.appendChild(detailTr);
tr.addEventListener("click",function(){toggleDetail(tr,detailTr,panel,s)});
});
renderPagination();
}

function renderPagination(){
var totalPages=Math.ceil(filtered.length/PER_PAGE);
pag.innerHTML="";
if(totalPages<=1)return;
var prev=document.createElement("button");prev.textContent="\u2190 Prev";prev.disabled=page===0;prev.onclick=function(){page--;render();window.scrollTo(0,0)};pag.appendChild(prev);
var info=document.createElement("button");info.textContent="Page "+(page+1)+" / "+totalPages;info.className="active";info.disabled=true;pag.appendChild(info);
var next=document.createElement("button");next.textContent="Next \u2192";next.disabled=page>=totalPages-1;next.onclick=function(){page++;render();window.scrollTo(0,0)};pag.appendChild(next);
}

// Auto-switch to skill-prof sort when a skill filter is selected
skillFilter.addEventListener("change",function(){
    if(skillFilter.value&&sortEl.value==="name"){sortEl.value="skill-prof"}
    updateSkillDesc();
    applyFilters();
});
search.addEventListener("input",applyFilters);
sortEl.addEventListener("change",applyFilters);
modFilter.addEventListener("change",applyFilters);
applyFilters();
})();
</script>
<script src="../navbar.js"></script>
</body>
</html>
