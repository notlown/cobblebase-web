<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cobblebase Species Database</title>
<link rel="icon" type="image/png" href="../cobblebase_icon.png">
<link rel="stylesheet" href="../navbar.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh;padding-top:56px}
a{color:#f7c948;text-decoration:none}
a:hover{text-decoration:underline}
header{background:#161b22;border-bottom:1px solid #30363d;padding:0 0 1rem;text-align:center}
.banner{width:100%;max-height:200px;border-radius:0;margin-bottom:0.5rem;object-fit:cover}
h1{font-size:1.5rem;color:#f7c948}
.subtitle{color:#8b949e;font-size:0.85rem;margin:0.3rem 0}
nav{margin-top:0.5rem;font-size:0.8rem}
nav a{margin:0 8px;color:#58a6ff}
.controls{max-width:1100px;margin:1rem auto;padding:0 1rem;display:flex;flex-wrap:wrap;gap:0.5rem;align-items:center}
input[type=text]{background:#161b22;border:1px solid #30363d;color:#c9d1d9;padding:8px 12px;border-radius:6px;font-size:0.9rem;flex:1;min-width:200px}
select{background:#161b22;border:1px solid #30363d;color:#c9d1d9;padding:8px;border-radius:6px;font-size:0.85rem}
label.toggle{display:flex;align-items:center;gap:6px;font-size:0.85rem;color:#8b949e;cursor:pointer}
.stats{max-width:1100px;margin:0.5rem auto;padding:0 1rem;font-size:0.8rem;color:#8b949e}
.table-wrap{max-width:1100px;margin:1rem auto;padding:0 1rem}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:8px 10px;background:#161b22;color:#f7c948;font-size:0.8rem;border-bottom:2px solid #30363d;position:sticky;top:0;cursor:pointer}
th:hover{color:#fff}
td{padding:6px 10px;border-bottom:1px solid #21262d;font-size:0.85rem;vertical-align:top}
tr:hover{background:#161b22}
.sprite{width:32px;height:32px;image-rendering:pixelated;vertical-align:middle;margin-right:6px}
.species-name{text-transform:capitalize;font-weight:600}
.fakemon-badge{font-size:0.65rem;background:#30363d;color:#8b949e;padding:1px 5px;border-radius:3px;margin-left:4px}
.skill-tags{display:flex;flex-wrap:wrap;gap:3px}
.skill-tag{font-size:0.7rem;padding:2px 6px;border-radius:3px;background:#21262d;color:#c9d1d9;white-space:nowrap}
.skill-tag .stars{color:#f7c948;margin-left:3px}
.cat-gathering{border-left:2px solid #4caf50}.cat-generation{border-left:2px solid #ff9800}.cat-combat{border-left:2px solid #f44336}
.cat-support{border-left:2px solid #e91e9e}.cat-utility{border-left:2px solid #2196f3}.cat-legendary{border-left:2px solid #ffd700}.cat-fairy{border-left:2px solid #f0abfc}
.pagination{max-width:1100px;margin:1rem auto;padding:0 1rem;display:flex;justify-content:center;gap:0.5rem}
.pagination button{background:#161b22;border:1px solid #30363d;color:#c9d1d9;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:0.85rem}
.pagination button:hover{background:#21262d}
.pagination button.active{background:#f7c948;color:#0d1117;border-color:#f7c948;font-weight:600}
.pagination button:disabled{opacity:0.3;cursor:default}
footer{text-align:center;padding:2rem;color:#8b949e;font-size:0.75rem;border-top:1px solid #21262d;margin-top:2rem}
tr.species-row{cursor:pointer;transition:background 0.2s}
tr.species-row.expanded{background:#161b22}
tr.detail-row td{padding:0;border-bottom:1px solid #21262d}
.detail-panel{max-height:0;overflow:hidden;transition:max-height 0.4s ease,padding 0.3s ease;padding:0 12px;background:#161b22;border-radius:0 0 8px 8px}
.detail-panel.open{max-height:800px;padding:12px}
.detail-close{float:right;background:none;border:1px solid #30363d;color:#8b949e;border-radius:4px;padding:2px 10px;cursor:pointer;font-size:0.8rem}
.detail-close:hover{color:#c9d1d9;border-color:#8b949e}
.detail-cat{margin-bottom:10px}
.detail-cat-header{font-size:0.8rem;font-weight:700;padding:4px 8px;margin-bottom:4px;border-left:3px solid #30363d;border-radius:2px;text-transform:capitalize}
.detail-cat-header.gathering{border-color:#4caf50;color:#4caf50}
.detail-cat-header.combat{border-color:#f44336;color:#f44336}
.detail-cat-header.support{border-color:#e91e9e;color:#e91e9e}
.detail-cat-header.utility{border-color:#2196f3;color:#2196f3}
.detail-cat-header.legendary{border-color:#ffd700;color:#ffd700}
.detail-cat-header.generation{border-color:#ff9800;color:#ff9800}
.detail-cat-header.fairy{border-color:#f0abfc;color:#f0abfc}
.detail-skills-grid{display:flex;flex-wrap:wrap;gap:6px;padding-left:11px}
.detail-skill{background:#21262d;border:1px solid #30363d;border-radius:5px;padding:4px 10px;font-size:0.78rem;display:flex;align-items:center;gap:6px}
.detail-skill .ds-name{color:#c9d1d9}
.detail-skill .ds-stars{color:#f7c948;letter-spacing:1px}
</style>
</head>
<body>
<header>
<img src="../cobblebase_header.png" alt="Cobblebase" class="banner">
<h1>Species Database</h1>
<p class="subtitle">Browse all 8,426 Pokemon species with their Cobblebase skill assignments</p>
<nav><a href="../docs/index.html">Documentation</a> | <a href="../generator/index.html">Datapack Generator</a> | <a href="https://github.com/notlown/cobblebase">GitHub</a></nav>
</header>

<div class="controls">
<input type="text" id="search" placeholder="Search species...">
<select id="skill-filter"><option value="">All Skills</option></select>
<select id="sort"><option value="name">Sort: Name</option><option value="count">Sort: Skill Count</option><option value="prof">Sort: Highest Prof</option></select>
<select id="mod-filter"><option value="cobblemon">Cobblemon Only</option><option value="all">All (incl. Fakemons)</option><option value="lively">Lively Mons</option><option value="alatias">Alatias AFP</option><option value="laser">Laser's Pack</option><option value="wilbayan">Wilbayan's</option><option value="gravelmon">Gravelmon</option></select>
</div>
<div class="stats" id="stats">Loading...</div>
<div class="table-wrap">
<table><thead><tr><th>Pokemon</th><th>Skills</th><th>#</th><th>Max Prof</th></tr></thead><tbody id="tbody"></tbody></table>
</div>
<div class="pagination" id="pagination"></div>
<footer>Cobblebase &mdash; <a href="https://modrinth.com/project/cobblebase">Modrinth</a> &bull; <a href="https://discord.gg/6As3sVZgVT">Discord</a> &bull; <a href="https://ko-fi.com/notlown">Ko-fi</a></footer>

<script src="database-data.js"></script>
<script>
(function(){
const PER_PAGE=50;
let page=0,filtered=[],currentMod="cobblemon",expandedSpecies=null;
const search=document.getElementById("search"),skillFilter=document.getElementById("skill-filter"),
sort=document.getElementById("sort"),modFilter=document.getElementById("mod-filter"),
tbody=document.getElementById("tbody"),stats=document.getElementById("stats"),pag=document.getElementById("pagination");

// Populate skill filter
const skillNames=new Set();
SPECIES_DB.forEach(s=>s.skills.forEach(sk=>skillNames.add(sk.name)));
[...skillNames].sort().forEach(n=>{const o=document.createElement("option");o.value=n;o.textContent=n;skillFilter.appendChild(o)});

function stars(n){return "★".repeat(n)+"☆".repeat(5-n)}
function spriteUrl(name){return"https://img.pokemondb.net/sprites/home/normal/"+name.replace(/[^a-z0-9-]/g,"")+".png"}

function toggleDetail(tr,detailTr,panel,s){
const isOpen=panel.classList.contains("open");
// Close any currently open panel
const prevOpen=tbody.querySelector(".detail-panel.open");
if(prevOpen){prevOpen.classList.remove("open");prevOpen.closest("tr").previousElementSibling.classList.remove("expanded")}
if(isOpen){expandedSpecies=null;return}
// Build panel content
panel.innerHTML="";
const closeBtn=document.createElement("button");closeBtn.className="detail-close";closeBtn.textContent="Close";
closeBtn.addEventListener("click",function(e){e.stopPropagation();panel.classList.remove("open");tr.classList.remove("expanded");expandedSpecies=null});
panel.appendChild(closeBtn);
// Group skills by category
const groups={};
s.skills.forEach(function(sk){if(!groups[sk.cat])groups[sk.cat]=[];groups[sk.cat].push(sk)});
const catOrder=["gathering","combat","support","utility","generation","legendary","fairy"];
catOrder.forEach(function(cat){
if(!groups[cat])return;
const catDiv=document.createElement("div");catDiv.className="detail-cat";
const header=document.createElement("div");header.className="detail-cat-header "+cat;header.textContent=cat+" ("+groups[cat].length+")";
catDiv.appendChild(header);
const grid=document.createElement("div");grid.className="detail-skills-grid";
groups[cat].forEach(function(sk){
const item=document.createElement("div");item.className="detail-skill";
item.innerHTML="<span class='ds-name'>"+sk.name+"</span><span class='ds-stars'>"+stars(sk.prof)+"</span>";
grid.appendChild(item);
});
catDiv.appendChild(grid);panel.appendChild(catDiv);
});
// Handle any categories not in catOrder
Object.keys(groups).forEach(function(cat){
if(catOrder.indexOf(cat)===-1){
const catDiv=document.createElement("div");catDiv.className="detail-cat";
const header=document.createElement("div");header.className="detail-cat-header";header.textContent=cat+" ("+groups[cat].length+")";
catDiv.appendChild(header);
const grid=document.createElement("div");grid.className="detail-skills-grid";
groups[cat].forEach(function(sk){
const item=document.createElement("div");item.className="detail-skill";
item.innerHTML="<span class='ds-name'>"+sk.name+"</span><span class='ds-stars'>"+stars(sk.prof)+"</span>";
grid.appendChild(item);
});
catDiv.appendChild(grid);panel.appendChild(catDiv);
}
});
tr.classList.add("expanded");
requestAnimationFrame(function(){panel.classList.add("open")});
expandedSpecies=s.name;
}

function applyFilters(){
const q=search.value.toLowerCase().trim(),sk=skillFilter.value;currentMod=modFilter.value;const mod=currentMod;
filtered=SPECIES_DB.filter(s=>{
if(mod==="cobblemon"&&s.mod!=="cobblemon")return false;
if(mod!=="all"&&mod!=="cobblemon"&&s.mod!==mod)return false;
if(q&&!s.name.includes(q))return false;
if(sk&&!s.skills.some(x=>x.name===sk))return false;
return true;
});
const sv=sort.value;
if(sv==="count")filtered.sort((a,b)=>b.count-a.count);
else if(sv==="prof")filtered.sort((a,b)=>b.maxProf-a.maxProf);
else filtered.sort((a,b)=>a.name.localeCompare(b.name));
page=0;render();
}

function render(){
const start=page*PER_PAGE,end=Math.min(start+PER_PAGE,filtered.length),slice=filtered.slice(start,end);
const modLabel=currentMod==="all"?" (all mods)":currentMod==="cobblemon"?"":" ("+currentMod+")";
stats.textContent="Showing "+(start+1)+"-"+end+" of "+filtered.length+" species"+modLabel;
tbody.innerHTML="";expandedSpecies=null;
slice.forEach(s=>{
const tr=document.createElement("tr");tr.className="species-row";
const nameCell=document.createElement("td");
const img=document.createElement("img");img.className="sprite";img.src=spriteUrl(s.name);img.alt="";img.loading="lazy";img.onerror=function(){this.style.display="none"};
nameCell.appendChild(img);
const span=document.createElement("span");span.className="species-name";span.textContent=s.name;nameCell.appendChild(span);
if(s.mod!=="cobblemon"){const b=document.createElement("span");b.className="fakemon-badge";b.textContent=s.mod;nameCell.appendChild(b)}
tr.appendChild(nameCell);
const skillCell=document.createElement("td");
const tags=document.createElement("div");tags.className="skill-tags";
s.skills.forEach(sk=>{
const tag=document.createElement("span");tag.className="skill-tag cat-"+sk.cat;
tag.innerHTML=sk.name+"<span class='stars'>"+stars(sk.prof)+"</span>";
tags.appendChild(tag);
});
skillCell.appendChild(tags);tr.appendChild(skillCell);
const countCell=document.createElement("td");countCell.textContent=s.count;tr.appendChild(countCell);
const profCell=document.createElement("td");profCell.innerHTML="<span style='color:#f7c948'>"+stars(s.maxProf)+"</span>";tr.appendChild(profCell);
tbody.appendChild(tr);
const detailTr=document.createElement("tr");detailTr.className="detail-row";
const detailTd=document.createElement("td");detailTd.colSpan=4;
const panel=document.createElement("div");panel.className="detail-panel";
detailTd.appendChild(panel);detailTr.appendChild(detailTd);tbody.appendChild(detailTr);
tr.addEventListener("click",function(){toggleDetail(tr,detailTr,panel,s)});
});
renderPagination();
}

function renderPagination(){
const totalPages=Math.ceil(filtered.length/PER_PAGE);
pag.innerHTML="";
if(totalPages<=1)return;
const prev=document.createElement("button");prev.textContent="← Prev";prev.disabled=page===0;prev.onclick=()=>{page--;render();window.scrollTo(0,0)};pag.appendChild(prev);
const info=document.createElement("button");info.textContent="Page "+(page+1)+" / "+totalPages;info.className="active";info.disabled=true;pag.appendChild(info);
const next=document.createElement("button");next.textContent="Next →";next.disabled=page>=totalPages-1;next.onclick=()=>{page++;render();window.scrollTo(0,0)};pag.appendChild(next);
}

search.addEventListener("input",applyFilters);
skillFilter.addEventListener("change",applyFilters);
sort.addEventListener("change",applyFilters);
modFilter.addEventListener("change",applyFilters);
applyFilters();
})();
</script>
<script src="../navbar.js"></script>
</body>
</html>
